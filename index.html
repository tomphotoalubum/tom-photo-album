<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tom Photo Album</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #fffaf5;
      color: #333;
    }

    header {
      padding: 22px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    .hero {
      padding: 48px 22px 36px;
      background: linear-gradient(135deg, #fff8ee, #fff4dc);
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .hero p {
      margin: 0;
      color: #7d6b5f;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 18px 60px;
    }

    .album-card {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      background: #fff;
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
    }

    .album-card img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 18px;
    }

    .album-info h3 {
      margin: 2px 0 6px;
      font-size: 18px;
    }

    .album-info p {
      margin: 4px 0;
      font-size: 14px;
      color: #6f625c;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fff4dc;
      color: #8a6230;
      font-size: 12px;
      font-weight: bold;
    }

    .new-button {
      display: inline-block;
      margin: 20px 0;
      padding: 12px 18px;
      border-radius: 999px;
      background: #f0b35f;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .album-card {
        grid-template-columns: 96px 1fr;
      }

      .album-card img {
        width: 96px;
        height: 96px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Tom Photo Album</h1>
  </header>

  <section class="hero">
    <h2>アルバム一覧</h2>
    <p>お客様ごとの納品アルバムを管理します</p>
  </section>

  <main class="container">

    <a class="new-button" href="#">
      ＋ 新しいアルバムを作成
    </a>

    <a class="album-card" href="paint-photo.html">
      <img src="https://picsum.photos/600/600?random=31" alt="">
      <div class="album-info">
        <h3>2026/05/17 ペイントフォト撮影会</h3>
        <p>公開期限：2026/06/30</p>
        <p>写真枚数：24枚</p>
        <span class="badge">公開中</span>
      </div>
    </a>

    <a class="album-card" href="#">
      <img src="https://picsum.photos/600/600?random=32" alt="">
      <div class="album-info">
        <h3>2026/06/07 紫陽花撮影会</h3>
        <p>公開期限：2026/07/31</p>
        <p>写真枚数：準備中</p>
        <span class="badge">準備中</span>
      </div>
    </a>

  </main>
</body>
</html>
