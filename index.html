<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom Photo Album 管理画面</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:"Zen Maru Gothic",sans-serif;
background:#fffaf5;
color:#333;
}

header{
background:white;
padding:16px 30px;
border-bottom:1px solid #e5e5e5;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:24px;
}

.tagline{
font-size:13px;
color:#888;
margin-top:4px;
}

.container{
max-width:1200px;
margin:auto;
padding:36px 20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.topbar h2{
margin:0;
font-size:34px;
}

.new-button{
background:#f0b35f;
color:white;
padding:14px 22px;
border-radius:14px;
border:0;
font-weight:700;
font-size:16px;
cursor:pointer;
font-family:"Zen Maru Gothic",sans-serif;
}

.album-grid{
display:grid;
grid-template-columns:1fr;
gap:24px;
}

@media(min-width:1024px){
.album-grid{
grid-template-columns:repeat(3,1fr);
}
}

.album-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

.album-image{
height:280px;
overflow:hidden;
position:relative;
}

.album-image img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.badge{
position:absolute;
top:12px;
right:12px;
background:#6ca66f;
color:white;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.album-content{
padding:18px;
}

.album-title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
line-height:1.5;
}

.album-meta{
font-size:14px;
color:#666;
line-height:1.8;
}

.actions{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:16px;
}

.action-btn{
padding:10px 5px;
text-align:center;
border-radius:10px;
text-decoration:none;
background:#f4f4f4;
color:#333;
font-size:12px;
border:0;
cursor:pointer;
font-family:"Zen Maru Gothic",sans-serif;
font-weight:600;
transition:.2s;
}

.action-btn:hover{
transform:translateY(-2px);
}

.delete{
color:#d9534f;
}

.new-card{
border:3px dashed #ddd;
background:white;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
min-height:420px;
font-size:42px;
color:#999;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
align-items:center;
justify-content:center;
padding:20px;
z-index:100;
}

.modal.active{
display:flex;
}

.modal-box{
background:white;
border-radius:24px;
padding:28px;
max-width:520px;
width:100%;
max-height:90vh;
overflow:auto;
}

.modal-box h2{
margin-top:0;
font-size:28px;
}

label{
display:block;
margin-top:16px;
font-weight:700;
}

input{
width:100%;
padding:13px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
margin-top:6px;
font-family:"Zen Maru Gothic",sans-serif;
}

.modal-actions{
display:flex;
gap:10px;
justify-content:flex-end;
margin-top:24px;
}

.cancel{
background:#eee;
color:#333;
}

.save{
background:#222;
color:white;
}

@media(max-width:700px){
header{
padding:14px 18px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:14px;
}

.topbar h2{
font-size:28px;
}

.album-image{
height:240px;
}

.actions{
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.action-btn{
font-size:11px;
padding:9px 4px;
}
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Tom Photo Album</h1>
    <div class="tagline">未来のあなたに贈る、あの日の空気📷</div>
  </div>
  <div>管理画面</div>
</header>

<div class="container">
  <div class="topbar">
    <h2>アルバム一覧</h2>
    <button class="new-button" onclick="openNewModal()">＋ 新しいアルバム</button>
  </div>

  <div class="album-grid" id="albumGrid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">新しいアルバムを作成</h2>

    <label>アルバム名</label>
    <input id="title" placeholder="例：2026/06/07 紫陽花撮影会">

    <label>写真枚数</label>
    <input id="count" placeholder="例：24枚">

    <label>公開期限</label>
    <input id="limit" placeholder="例：2026/07/31">

    <label>公開URL</label>
    <input id="url" placeholder="例：https://tom-photo-album.vercel.app/xxx.html">

    <label>サムネイル画像URL</label>
    <input id="thumb" placeholder="Google Driveのthumbnail URL">

    <label>DriveフォルダURL</label>
    <input id="drive" placeholder="Google DriveフォルダURL">

    <div class="modal-actions">
      <button class="action-btn cancel" onclick="closeModal()">キャンセル</button>
      <button class="action-btn save" onclick="saveAlbum()">保存</button>
    </div>
  </div>
</div>

<script>
const defaultAlbums = [
  {
    title: "2026/05/17 ペイントフォト",
    count: "24枚",
    limit: "2026/06/30",
    url: "https://tom-photo-album.vercel.app/paint-photo.html",
    thumb: "https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1200",
    drive: "https://drive.google.com/drive/folders/1jOgNso6cg-yONrqpHK6MWhZiiso1f9gB"
  }
];

let albums = JSON.parse(localStorage.getItem("albums")) || defaultAlbums;
let editingIndex = null;

function renderAlbums(){
  const grid = document.getElementById("albumGrid");
  grid.innerHTML = "";

  albums.forEach((album, index) => {
    grid.innerHTML += `
      <div class="album-card">
        <div class="album-image">
          <img src="${album.thumb}">
          <div class="badge">公開中</div>
        </div>

        <div class="album-content">
          <div class="album-title">📸 ${album.title}</div>

          <div class="album-meta">
            ${album.count}<br>
            公開期限：${album.limit}
          </div>

          <div class="actions">
            <a class="action-btn" href="${album.url}" target="_blank">👁 開く</a>

            <button class="action-btn" onclick="copyUrl('${album.url}')">
              📋 コピー
            </button>

            <a class="action-btn" href="${album.drive || '#'}" target="_blank">
              📁 Drive
            </a>

            <button class="action-btn" onclick="openEditModal(${index})">
              ⚙️ 設定
            </button>

            <button class="action-btn delete" onclick="deleteAlbum(${index})">
              🗑 削除
            </button>
          </div>
        </div>
      </div>
    `;
  });

  grid.innerHTML += `<div class="new-card" onclick="openNewModal()">＋</div>`;
}

function openNewModal(){
  editingIndex = null;
  document.getElementById("modalTitle").textContent = "新しいアルバムを作成";
  clearForm();
  document.getElementById("modal").classList.add("active");
}

function openEditModal(index){
  editingIndex = index;
  const album = albums[index];

  document.getElementById("modalTitle").textContent = "アルバムを編集";
  document.getElementById("title").value = album.title || "";
  document.getElementById("count").value = album.count || "";
  document.getElementById("limit").value = album.limit || "";
  document.getElementById("url").value = album.url || "";
  document.getElementById("thumb").value = album.thumb || "";
  document.getElementById("drive").value = album.drive || "";

  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function clearForm(){
  document.getElementById("title").value = "";
  document.getElementById("count").value = "";
  document.getElementById("limit").value = "";
  document.getElementById("url").value = "";
  document.getElementById("thumb").value = "";
  document.getElementById("drive").value = "";
}

function saveAlbum(){
  const album = {
    title: document.getElementById("title").value,
    count: document.getElementById("count").value,
    limit: document.getElementById("limit").value,
    url: document.getElementById("url").value,
    thumb: document.getElementById("thumb").value,
    drive: document.getElementById("drive").value
  };

  if(editingIndex === null){
    albums.push(album);
  }else{
    albums[editingIndex] = album;
  }

  localStorage.setItem("albums", JSON.stringify(albums));

  closeModal();
  clearForm();
  renderAlbums();
}

function copyUrl(url){
  navigator.clipboard.writeText(url);
  alert("コピーしました✨");
}

function deleteAlbum(index){
  const ok = confirm("このアルバムを削除しますか？");

  if(ok){
    albums.splice(index,1);
    localStorage.setItem("albums", JSON.stringify(albums));
    renderAlbums();
  }
}

renderAlbums();
</script>

</body>
</html>
