<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペイントフォト撮影会｜Tom Photo Album</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:"Zen Maru Gothic",sans-serif;
background:#f5f8f7;
color:#2f3f3c;
}

.password-screen{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
background:linear-gradient(135deg,#f5f8f7,#eaf2f0);
}

.password-box{
background:white;
border-radius:26px;
padding:32px;
max-width:420px;
width:100%;
box-shadow:0 8px 24px rgba(70,100,95,.10);
text-align:center;
}

.password-box h1{
margin:0 0 8px;
font-size:28px;
color:#5f8f86;
}

.password-box p{
color:#667875;
font-size:14px;
}

.password-box input{
width:100%;
padding:14px;
border:1px solid #d7e5e2;
border-radius:14px;
font-size:16px;
margin-top:16px;
font-family:"Zen Maru Gothic",sans-serif;
}

.password-box button{
width:100%;
margin-top:14px;
padding:14px;
border:0;
border-radius:999px;
background:#7faea3;
color:white;
font-weight:700;
font-size:16px;
font-family:"Zen Maru Gothic",sans-serif;
cursor:pointer;
}

.error{
color:#d9534f;
font-size:14px;
margin-top:12px;
display:none;
}

.album{display:none}

.topbar{
padding:18px 24px;
font-weight:700;
background:white;
border-bottom:1px solid #e3eeee;
color:#5f8f86;
}

.hero{
height:65vh;
background:url("https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1600") center/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.26);
}

.hero h1{
position:relative;
color:white;
font-size:58px;
font-weight:400;
letter-spacing:18px;
text-shadow:0 2px 10px rgba(0,0,0,.3);
}

.info{
padding:34px 24px;
background:white;
}

.info h2{
margin:0 0 14px;
font-size:24px;
}

.message{
font-size:16px;
line-height:2;
color:#4f625f;
margin-bottom:18px;
}

.meta{
color:#667875;
line-height:1.8;
}

.guide{
background:#f5f8f7;
padding:24px;
border-top:1px solid #e3eeee;
border-bottom:1px solid #e3eeee;
}

.guide h3{
margin:0 0 10px;
color:#3f5f59;
}

.guide p{
margin:0;
color:#667875;
line-height:1.9;
}

.toolbar{
display:flex;
justify-content:flex-end;
gap:10px;
padding:18px 20px;
background:#fff;
border-bottom:1px solid #e3eeee;
}

.button{
background:#7faea3;
color:white;
padding:12px 18px;
border-radius:999px;
text-decoration:none;
font-weight:700;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:4px;
background:white;
}

.gallery img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
display:block;
cursor:pointer;
}

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
}

.lightbox img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.close-btn{
position:absolute;
top:18px;
right:28px;
color:white;
font-size:42px;
cursor:pointer;
z-index:10001;
}

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,.18);
color:white;
border:0;
font-size:42px;
width:56px;
height:56px;
border-radius:50%;
cursor:pointer;
z-index:10001;
}

.prev-btn{left:20px}
.next-btn{right:20px}

.photo-count{
position:absolute;
bottom:20px;
color:white;
font-size:14px;
background:rgba(0,0,0,.35);
padding:6px 12px;
border-radius:999px;
}

.expired-screen{
min-height:100vh;
display:none;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
background:#f5f8f7;
}

.expired-box{
background:white;
border-radius:26px;
padding:34px;
max-width:460px;
box-shadow:0 8px 24px rgba(70,100,95,.10);
}

.expired-box h1{
color:#5f8f86;
margin:0 0 12px;
}

.expired-box p{
color:#667875;
line-height:1.8;
margin:0;
}

@media(min-width:768px){
.gallery{
grid-template-columns:repeat(5,1fr);
}

.hero h1{
font-size:86px;
}
}
</style>
</head>

<body>

<div class="password-screen" id="passwordScreen">
  <div class="password-box">
    <h1>Tom Photo Album</h1>
    <p>合い言葉を入力してください</p>

    <input id="passwordInput" type="password" placeholder="合い言葉">

    <button onclick="checkPassword()">アルバムを見る</button>

    <div class="error" id="errorMessage">合い言葉が違います</div>
  </div>
</div>

<div class="expired-screen" id="expiredScreen">
  <div class="expired-box">
    <h1>公開終了</h1>
    <p>
      このアルバムの公開は終了しました。<br>
      必要な場合は、撮影者までお問い合わせください。
    </p>
  </div>
</div>

<div class="album" id="album">

  <div class="topbar">Tom Photo Album</div>

  <div class="hero">
    <h1>PAINT</h1>
  </div>

  <div class="info">
    <h2>2026/05/17 ペイントフォト撮影会</h2>

    <div class="message">
      お写真ができあがりました。<br>
      未来のあなたに贈る、<br>
      あの日の空気をお届けします。
    </div>

    <div class="meta" id="albumMeta">
      125枚
    </div>
  </div>

  <div class="guide">
    <h3>ダウンロードについて</h3>
    <p>
      お写真は画像を長押し、またはクリックして保存していただけます。<br>
      一括ダウンロードをご希望の方は、下のボタンより保存をお願いいたします。
    </p>
  </div>

  <div class="toolbar">
    <a class="button"
href="https://drive.google.com/uc?export=download&id=19zP1WPDXIajBH0DDxEq_EUOJf1wjqM77"
target="_blank">
  📥 まとめてDL
</a>
  </div>

  <div class="gallery">
    <img src="https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1000" onclick="openLightbox(0)">
    <img src="https://picsum.photos/800/1000?random=2" onclick="openLightbox(1)">
    <img src="https://picsum.photos/800/1000?random=3" onclick="openLightbox(2)">
    <img src="https://picsum.photos/800/1000?random=4" onclick="openLightbox(3)">
    <img src="https://picsum.photos/800/1000?random=5" onclick="openLightbox(4)">
    <img src="https://picsum.photos/800/1000?random=6" onclick="openLightbox(5)">
    <img src="https://picsum.photos/800/1000?random=7" onclick="openLightbox(6)">
    <img src="https://picsum.photos/800/1000?random=8" onclick="openLightbox(7)">
    <img src="https://picsum.photos/800/1000?random=9" onclick="openLightbox(8)">
    <img src="https://picsum.photos/800/1000?random=10" onclick="openLightbox(9)">
  </div>

</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="close-btn" onclick="event.stopPropagation();closeLightbox()">×</span>

  <button class="nav-btn prev-btn" onclick="event.stopPropagation();prevPhoto()">‹</button>

  <img id="lightboxImg" onclick="event.stopPropagation()">

  <button class="nav-btn next-btn" onclick="event.stopPropagation();nextPhoto()">›</button>

  <div class="photo-count" id="photoCount"></div>
</div>

<script>
const correctPassword = "paint2026";
const expiryDate = "2026-06-30";
const photoCountText = "125枚";

const photos = [
  "https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1600",
  "https://picsum.photos/1200/1500?random=2",
  "https://picsum.photos/1200/1500?random=3",
  "https://picsum.photos/1200/1500?random=4",
  "https://picsum.photos/1200/1500?random=5",
  "https://picsum.photos/1200/1500?random=6",
  "https://picsum.photos/1200/1500?random=7",
  "https://picsum.photos/1200/1500?random=8",
  "https://picsum.photos/1200/1500?random=9",
  "https://picsum.photos/1200/1500?random=10"
];

let currentIndex = 0;

function checkPassword(){
  const input = document.getElementById("passwordInput").value;
  const error = document.getElementById("errorMessage");

  if(input === correctPassword){
    document.getElementById("passwordScreen").style.display = "none";

    if(isExpired()){
      document.getElementById("expiredScreen").style.display = "flex";
    }else{
      document.getElementById("album").style.display = "block";
      updateExpiryInfo();
    }

  }else{
    error.style.display = "block";
  }
}

function isExpired(){
  const today = new Date();
  today.setHours(0,0,0,0);

  const expiry = new Date(expiryDate);
  expiry.setHours(23,59,59,999);

  return today > expiry;
}

function updateExpiryInfo(){
  const today = new Date();
  today.setHours(0,0,0,0);

  const expiry = new Date(expiryDate);
  expiry.setHours(23,59,59,999);

  const diffTime = expiry - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  const meta = document.getElementById("albumMeta");

  if(diffDays === 0){
    meta.innerHTML = `
      ${photoCountText} ｜ 公開期限：${expiryDate}<br>
      本日まで公開
    `;
  }else{
    meta.innerHTML = `
      ${photoCountText} ｜ 公開期限：${expiryDate}<br>
      あと${diffDays}日
    `;
  }
}

function openLightbox(index){
  currentIndex = index;
  document.getElementById("lightbox").style.display = "flex";
  updateLightbox();
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}

function updateLightbox(){
  document.getElementById("lightboxImg").src = photos[currentIndex];
  document.getElementById("photoCount").textContent = (currentIndex + 1) + " / " + photos.length;
}

function nextPhoto(){
  currentIndex = (currentIndex + 1) % photos.length;
  updateLightbox();
}

function prevPhoto(){
  currentIndex = (currentIndex - 1 + photos.length) % photos.length;
  updateLightbox();
}

document.addEventListener("keydown", function(event){
  if(document.getElementById("lightbox").style.display === "flex"){
    if(event.key === "ArrowRight") nextPhoto();
    if(event.key === "ArrowLeft") prevPhoto();
    if(event.key === "Escape") closeLightbox();
  }
});
</script>

</body>
</html>
