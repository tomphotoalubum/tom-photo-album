<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペイントフォト撮影会</title>

<style>

body{
margin:0;
font-family:"Helvetica Neue",sans-serif;
background:#fff;
}

.topbar{
padding:18px 24px;
font-weight:bold;
border-bottom:1px solid #eee;
}

.hero{
height:70vh;
background:url("https://picsum.photos/1600/1000?random=20")
center center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
color:white;
font-size:60px;
font-weight:300;
letter-spacing:12px;
text-shadow:0 2px 10px rgba(0,0,0,.3);
}

.info{
padding:30px;
}

.info h2{
margin-bottom:10px;
}

.toolbar{
display:flex;
justify-content:flex-end;
gap:10px;
padding:20px;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
}

.button{
background:#222;
color:white;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:4px;
}

.gallery img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
display:block;
}

@media(min-width:768px){

.gallery{
grid-template-columns:repeat(5,1fr);
}

.hero h1{
font-size:90px;
}

}

</style>

</head>
<body>

<div class="topbar">
Tom Photo Album
</div>

<div class="hero">
<h1>PAINT</h1>
</div>

<div class="info">
<h2>2026/05/17 ペイントフォト撮影会</h2>
<p>24枚 ｜ 公開期限 2026/06/30</p>
</div>

<div class="toolbar">
<a class="button" href="#">まとめてDL</a>
</div>

<div class="gallery">

<img src="https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1000">
<img src="https://picsum.photos/800/1000?random=2">
<img src="https://picsum.photos/800/1000?random=3">
<img src="https://picsum.photos/800/1000?random=4">
<img src="https://picsum.photos/800/1000?random=5">
<img src="https://picsum.photos/800/1000?random=6">
<img src="https://picsum.photos/800/1000?random=7">
<img src="https://picsum.photos/800/1000?random=8">
<img src="https://picsum.photos/800/1000?random=9">
<img src="https://picsum.photos/800/1000?random=10">

</div>

</body>
</html>
