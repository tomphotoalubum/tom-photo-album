<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペイントフォト撮影会｜Tom Photo Album</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:"Zen Maru Gothic",sans-serif;
background:#f5f8f7;
color:#2f3f3c;
}

.password-screen{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
background:linear-gradient(135deg,#f5f8f7,#eaf2f0);
}

.password-box{
background:white;
border-radius:26px;
padding:32px;
max-width:420px;
width:100%;
box-shadow:0 8px 24px rgba(70,100,95,.10);
text-align:center;
}

.password-box h1{
margin:0 0 8px;
font-size:28px;
color:#5f8f86;
}

.password-box p{
color:#667875;
font-size:14px;
}

.password-box input{
width:100%;
padding:14px;
border:1px solid #d7e5e2;
border-radius:14px;
font-size:16px;
margin-top:16px;
font-family:"Zen Maru Gothic",sans-serif;
}

.password-box button{
width:100%;
margin-top:14px;
padding:14px;
border:0;
border-radius:999px;
background:#7faea3;
color:white;
font-weight:700;
font-size:16px;
font-family:"Zen Maru Gothic",sans-serif;
cursor:pointer;
}

.error{
color:#d9534f;
font-size:14px;
margin-top:12px;
display:none;
}

.album{
display:none;
}

.topbar{
padding:18px 24px;
font-weight:700;
background:white;
border-bottom:1px solid #e3eeee;
color:#5f8f86;
}

.hero{
height:65vh;
background:url("https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1600") center/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.26);
}

.hero h1{
position:relative;
color:white;
font-size:58px;
font-weight:400;
letter-spacing:18px;
text-shadow:0 2px 10px rgba(0,0,0,.3);
}

.info{
padding:34px 24px;
background:white;
}

.info h2{
margin:0 0 14px;
font-size:24px;
}

.message{
font-size:16px;
line-height:2;
color:#4f625f;
margin-bottom:18px;
}

.meta{
color:#667875;
line-height:1.8;
}

.guide{
background:#f5f8f7;
padding:24px;
border-top:1px solid #e3eeee;
border-bottom:1px solid #e3eeee;
}

.guide h3{
margin:0 0 10px;
color:#3f5f59;
}

.guide p{
margin:0;
color:#667875;
line-height:1.9;
}

.toolbar{
display:flex;
justify-content:flex-end;
gap:10px;
padding:18px 20px;
background:#fff;
border-bottom:1px solid #e3eeee;
}

.button{
background:#7faea3;
color:white;
padding:12px 18px;
border-radius:999px;
text-decoration:none;
font-weight:700;
}

.gallery img{
cursor:pointer;
}

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
}

.lightbox img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

.close-btn{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:42px;
cursor:pointer;
}

.gallery img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
display:block;
}

@media(min-width:768px){
.gallery{
grid-template-columns:repeat(5,1fr);
}

.hero h1{
font-size:86px;
}
}
</style>
</head>

<body>

<div class="password-screen" id="passwordScreen">
  <div class="password-box">
    <h1>Tom Photo Album</h1>
    <p>合い言葉を入力してください</p>

    <input id="passwordInput" type="password" placeholder="合い言葉">

    <button onclick="checkPassword()">アルバムを見る</button>

    <div class="error" id="errorMessage">
      合い言葉が違います
    </div>
  </div>
</div>

<div class="album" id="album">

  <div class="topbar">
    Tom Photo Album
  </div>

  <div class="hero">
    <h1>PAINT</h1>
  </div>

  <div class="info">
    <h2>2026/05/17 ペイントフォト撮影会</h2>

    <div class="message">
      お写真ができあがりました。<br>
      未来のあなたに贈る、<br>
      あの日の空気をお届けします。
    </div>

    <div class="meta">
      24枚 ｜ 公開期限：2026/06/30
    </div>
  </div>

  <div class="guide">
    <h3>ダウンロードについて</h3>
    <p>
      お写真は画像を長押し、またはクリックして保存していただけます。<br>
      一括ダウンロードをご希望の方は、下のボタンより保存をお願いいたします。
    </p>
  </div>

  <div class="toolbar">
    <a class="button" href="#">まとめてDL</a>
  </div>

  <div class="gallery">
    <img src="https://drive.google.com/thumbnail?id=1ejwClHnDKfz0324Av0gaqn0b71fN_S6G&sz=w1000">
    <img src="https://picsum.photos/800/1000?random=2"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=3"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=4"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=5"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=6"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=7"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=8"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=9"onclick="openLightbox(this.src)>
    <img src="https://picsum.photos/800/1000?random=10"onclick="openLightbox(this.src)>
  </div>

</div>

<script>
const correctPassword = "paint2026";

function checkPassword(){
  function openLightbox(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
  const input = document.getElementById("passwordInput").value;
  const error = document.getElementById("errorMessage");

  if(input === correctPassword){
    document.getElementById("passwordScreen").style.display = "none";
    document.getElementById("album").style.display = "block";
  }else{
    error.style.display = "block";
  }
}

</div>
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="close-btn">×</span>
  <img id="lightboxImg">
</div>
</script>

</body>
</html>
